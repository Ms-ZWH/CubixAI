name: Build & Deploy to Tencent COS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      # 安装腾讯云 COSCMD
      - name: Install coscmd
        run: pip install coscmd

      # 配置 COSCMD
      - name: Configure coscmd
        run: |
          coscmd config \
            -a ${{ secrets.TENCENT_SECRET_ID }} \
            -s ${{ secrets.TENCENT_SECRET_KEY }} \
            -b ${{ secrets.COS_BUCKET }} \
            -r ${{ secrets.COS_REGION }}

      # 上传到 COS
      - name: Upload to COS
        run: |
          coscmd upload -r dist/ / --delete --ignore "./*.map"

      # 刷新 CDN 缓存（Python 签名，更可靠）
      - name: Refresh CDN
        run: |
          pip install tencentcloud-sdk-python 2>/dev/null
          python3 << 'PYEOF'
          import json, os
          from tencentcloud.common import credential
          from tencentcloud.cdn.v20180606 import cdn_client, models

          secret_id = os.environ["TENCENT_SECRET_ID"]
          secret_key = os.environ["TENCENT_SECRET_KEY"]
          domain = os.environ["CDN_DOMAIN"]
          region = os.environ["COS_REGION"]

          cred = credential.Credential(secret_id, secret_key)
          client = cdn_client.CdnClient(cred, region)

          req = models.PurgePathCacheRequest()
          req.Paths = [f"https://{domain}/"]
          req.FlushType = "flush"

          resp = client.PurgePathCache(req)
          print(json.dumps(json.loads(resp.to_json_string()), indent=2, ensure_ascii=False))
          PYEOF
        env:
          TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
          TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
          CDN_DOMAIN: ${{ secrets.CDN_DOMAIN }}
          COS_REGION: ${{ secrets.COS_REGION }}
